name: smoke

# GO/NO-GO probe of hh vacancy-endpoint access from GitHub Actions egress (PLAN.md §7 stage 0).
# Stays as a diagnostic afterwards.
on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Probe hh /vacancies
        run: |
          UA="salary-radar-kz/1.0 (+https://github.com/midat-fx/salary-radar-kz; midat.faizov@gmail.com)"
          code=$(curl -s -o body.txt -w '%{http_code}' -A "$UA" \
            "https://api.hh.ru/vacancies?text=python&area=40&per_page=1")
          echo "HTTP ${code}"
          if [ "${code}" != "200" ]; then
            echo "--- response body ---"
            cat body.txt
            exit 1
          fi
          echo "--- response body (first 300 bytes) ---"
          head -c 300 body.txt
