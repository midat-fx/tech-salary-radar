name: smoke

# Diagnostic: confirm the three public ATS APIs are reachable from Actions egress (PLAN.md §4).
on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Probe ATS boards
        run: |
          UA="tech-salary-radar/1.0 (+https://github.com/midat-fx/tech-salary-radar; midat.faizov@gmail.com)"
          fail=0
          probe() {
            code=$(curl -s -o body.txt -w '%{http_code}' -A "$UA" "$1")
            echo "$2: HTTP ${code} ($(wc -c <body.txt) bytes)"
            [ "${code}" = "200" ] || fail=1
          }
          probe "https://boards-api.greenhouse.io/v1/boards/stripe/jobs?content=true" greenhouse
          probe "https://api.lever.co/v0/postings/palantir?mode=json" lever
          probe "https://api.ashbyhq.com/posting-api/job-board/ramp?includeCompensation=true" ashby
          exit $fail
