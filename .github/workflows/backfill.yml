name: backfill

# One-off: assign first_seen by each currently-open job's publish date (survivorship-biased).
# ATS boards expose only currently-open jobs, so this backfills "new by publish date" only.
on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GH_TOKEN: ${{ github.token }}
      TZ: Asia/Almaty
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - name: Backfill jobs by publish date
        run: python -m etl.cli backfill
      - name: Commit & push
        run: |
          git config user.name "Midat Faizov"
          git config user.email "midat.faizov@gmail.com"
          git add -A
          if git diff --cached --quiet; then echo "no changes"; exit 0; fi
          git commit -m "data: backfill by publish date"
          for i in 1 2 3; do git push && exit 0; git pull --rebase origin main || true; done
          echo "push failed after 3 attempts"; exit 1
