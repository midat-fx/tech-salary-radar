name: ci

# ruff + pytest. The llm-eval step is added in stage 5 (needs GEMINI_API_KEY).
# paths-ignore keeps daily data commits from triggering CI (PLAN.md §8 rule 8).
on:
  push:
    branches: [main]
    paths-ignore:
      - "data/**"
      - "site/data/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check etl tests
      - run: pytest -q
